<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>DuguenPT 운동 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f4f1;--card:#fff;--border:rgba(0,0,0,0.09);
  --text:#1a1a18;--sec:#6b6b67;--hint:#a8a8a2;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-t:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-t:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-t:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-t:#b91c1c;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-t:#6d28d9;
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --sh-md:0 4px 16px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:80px}
.hd{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.logo{font-size:17px;font-weight:700;color:var(--text)}.logo span{color:var(--blue)}
.mode-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.mode-badge.trainer{background:var(--blue-bg);color:var(--blue-t)}
.mode-badge.member{background:var(--green-bg);color:var(--green-t)}
.wrap{max-width:480px;margin:0 auto;padding:16px 14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.ctitle{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--text)}
.ctitle small{font-size:12px;font-weight:400;color:var(--hint);margin-left:6px}
.field{margin-bottom:11px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:600;color:var(--sec);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}
.field textarea{resize:none;height:80px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;font-size:15px;font-weight:700;border-radius:var(--r-md);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;margin-top:8px}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.3)}
.btn-gray{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn:hover{opacity:.88}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
.chip{padding:7px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;color:var(--sec);background:var(--card);font-family:'Noto Sans KR',sans-serif;transition:all .15s;user-select:none}
.chip.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-t);font-weight:600}
.chip.green.on{background:var(--green-bg);border-color:var(--green);color:var(--green-t)}

/* 운동 기록 */
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.ex-header{padding:12px 14px;background:var(--bg);display:flex;justify-content:space-between;align-items:center}
.ex-name{font-size:14px;font-weight:700}
.ex-target{font-size:12px;color:var(--sec)}
.ex-prev{font-size:11px;color:var(--blue-t);background:var(--blue-bg);padding:2px 8px;border-radius:10px;font-weight:500}
.set-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-num{font-size:12px;color:var(--sec);width:28px;flex-shrink:0;font-weight:600}
.set-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:15px;text-align:center;background:var(--bg);font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--blue)}
.set-unit{font-size:12px;color:var(--sec);width:20px;text-align:center;flex-shrink:0}
.set-done{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.set-done.checked{background:var(--green);border-color:var(--green)}
.set-done.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.add-set-btn{width:100%;padding:10px;font-size:13px;color:var(--blue-t);background:var(--blue-bg);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600}
.pr-badge{font-size:11px;background:#FAEEDA;color:#633806;padding:2px 7px;border-radius:10px;font-weight:600;margin-left:6px}

/* 체중 입력 */
.weight-display{text-align:center;padding:20px}
.weight-big{font-size:52px;font-weight:700;color:var(--text);line-height:1}
.weight-unit{font-size:18px;color:var(--sec);margin-left:4px}
.weight-diff{font-size:14px;margin-top:8px;font-weight:600}
.weight-diff.up{color:var(--amber-t)}
.weight-diff.down{color:var(--green-t)}
.weight-diff.same{color:var(--sec)}

/* 그래프 */
.chart-wrap{padding:8px 0;overflow-x:auto}
.chart-inner{min-width:300px;height:120px;display:flex;align-items:flex-end;gap:4px;padding:0 8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:28px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.bar-label{font-size:10px;color:var(--sec);margin-top:3px;white-space:nowrap}
.bar-val{font-size:10px;font-weight:600;margin-bottom:2px}

/* 피드백 */
.feedback-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:8px;box-shadow:var(--sh)}
.fb-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fb-name{font-size:13px;font-weight:700}
.fb-date{font-size:11px;color:var(--hint)}
.fb-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.fb-badge.pending{background:var(--amber-bg);color:var(--amber-t)}
.fb-badge.done{background:var(--green-bg);color:var(--green-t)}
.fb-content{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px}
.fb-reply{background:var(--blue-bg);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;color:var(--blue-t);margin-top:8px}

/* 주간 비교 */
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.compare-row:last-child{border-bottom:none}
.cr-name{font-size:13px;font-weight:600;flex:1}
.cr-prev{font-size:12px;color:var(--hint);text-align:right;margin-right:10px}
.cr-curr{font-size:13px;font-weight:700;text-align:right;min-width:70px}
.cr-diff{font-size:11px;font-weight:600;padding:1px 6px;border-radius:8px;margin-left:6px}
.cr-diff.up{background:var(--green-bg);color:var(--green-t)}
.cr-diff.dn{background:var(--red-bg);color:var(--red-t)}
.cr-diff.eq{background:var(--bg);color:var(--sec)}

/* 트레이너 회원 카드 */
.member-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .15s}
.member-card:hover{box-shadow:var(--sh-md)}
.member-avatar{width:44px;height:44px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--blue-t);flex-shrink:0}
.member-info{flex:1}
.member-name{font-size:14px;font-weight:700}
.member-sub{font-size:12px;color:var(--sec);margin-top:2px}
.member-status{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.done{background:var(--green)}
.status-dot.pending{background:var(--amber)}
.status-dot.none{background:var(--border)}
.notif-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:10px}

/* 프로그램 편집 */
.day-section{margin-bottom:12px}
.day-header{font-size:13px;font-weight:700;color:var(--sec);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.ex-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-item-name{flex:1;font-size:13px;font-weight:600}
.ex-item-detail{font-size:12px;color:var(--sec)}
.ex-edit-btn{font-size:12px;color:var(--blue-t);background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;padding:4px 8px}

/* 주기화 진행바 */
.phase-bar{display:flex;gap:4px;margin-bottom:12px}
.phase-block{flex:1;height:6px;border-radius:3px}
.phase-block.adapt{background:#5DCAA5}
.phase-block.volume{background:#378ADD}
.phase-block.intensity{background:#534AB7}
.phase-block.deload{background:#E24B4A}
.phase-block.inactive{background:var(--border)}
.phase-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--sec);margin-bottom:8px}
.current-phase{font-size:13px;font-weight:600;padding:6px 12px;border-radius:var(--r-sm);display:inline-block;margin-bottom:12px}
.current-phase.adapt{background:#E1F5EE;color:#085041}
.current-phase.volume{background:#E6F1FB;color:#0C447C}
.current-phase.intensity{background:#EEEDFE;color:#3C3489}
.current-phase.deload{background:#FCEBEB;color:#791F1F}

/* 바텀 네비 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.06)}
.nav-btn{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;transition:color .15s}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;color:var(--sec)}
.nav-btn.active .nav-label{color:var(--blue)}

/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 토스트 */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a18;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fade{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-title{font-size:13px;font-weight:700;color:var(--text);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.04em}
.empty-state{text-align:center;padding:32px 16px;color:var(--hint);font-size:13px}

/* 입장 화면 */
.landing-wrap{max-width:400px;margin:0 auto;padding:40px 20px;text-align:center}
.landing-wrap h1{font-size:26px;font-weight:700;margin-bottom:8px}
.landing-wrap h1 span{color:var(--blue)}
.landing-wrap p{font-size:15px;color:var(--sec);margin-bottom:32px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.mode-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px 16px;cursor:pointer;transition:all .2s}
.mode-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.mode-card.blue:hover,.mode-card.blue.sel{border-color:var(--blue);background:var(--blue-bg)}
.mode-card.green:hover,.mode-card.green.sel{border-color:var(--green);background:var(--green-bg)}
.mc-icon{font-size:32px;margin-bottom:8px}
.mc-title{font-size:15px;font-weight:700;margin-bottom:4px}
.mc-desc{font-size:12px;color:var(--sec)}
.mode-card.blue .mc-title{color:var(--blue-t)}
.mode-card.green .mc-title{color:var(--green-t)}
</style>
</head>
<body>

<header class="hd">
  <div class="logo">Duguen<span>PT</span></div>
  <div id="modeBadge" style="display:none" class="mode-badge"></div>
</header>

<!-- 입장 화면 -->
<div id="landingView" class="fade">
  <div class="landing-wrap">
    <h1>Duguen<span>PT</span></h1>
    <p>운동 기록 · 식단 · 피드백을<br>한 곳에서 관리하세요</p>
    <div class="mode-cards">
      <div class="mode-card blue" onclick="selectMode('trainer')">
        <div class="mc-icon">🏋️</div>
        <div class="mc-title">트레이너</div>
        <div class="mc-desc">회원 관리 · 프로그램 설계</div>
      </div>
      <div class="mode-card green" onclick="selectMode('member')">
        <div class="mc-icon">💪</div>
        <div class="mc-title">회원</div>
        <div class="mc-desc">운동 기록 · 식단 확인</div>
      </div>
    </div>
    <div id="trainerLoginWrap" style="display:none" class="card fade">
      <div class="field"><label>트레이너 비밀번호</label>
        <input type="password" id="trainerPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')trainerLogin()"/>
      </div>
      <button class="btn btn-blue" onclick="trainerLogin()">입장하기</button>
      <div id="pwErr" style="display:none;font-size:13px;color:var(--red);margin-top:8px;text-align:center">비밀번호가 올바르지 않습니다</div>
    </div>
    <div id="memberLoginWrap" style="display:none" class="card fade">
      <div class="field"><label>회원 코드</label>
        <input type="text" id="memberCode" placeholder="트레이너에게 받은 코드 (예: K7A2)" style="text-transform:uppercase" onkeydown="if(event.key==='Enter')memberLogin()"/>
      </div>
      <button class="btn btn-green" onclick="memberLogin()">입장하기</button>
      <div id="codeErr" style="display:none;font-size:13px;color:var(--red);margin-top:8px;text-align:center">코드를 찾을 수 없습니다</div>
    </div>
  </div>
</div>

<!-- 트레이너 메인 -->
<div id="trainerView" style="display:none">
  <div class="wrap" id="tContent"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="tn0" onclick="tNav(0)"><span class="nav-icon">👥</span><span class="nav-label">회원</span></button>
    <button class="nav-btn" id="tn1" onclick="tNav(1)"><span class="nav-icon">📋</span><span class="nav-label">프로그램</span></button>
    <button class="nav-btn" id="tn2" onclick="tNav(2)"><span class="nav-icon">💬</span><span class="nav-label">피드백</span></button>
    <button class="nav-btn" id="tn3" onclick="tNav(3)"><span class="nav-icon">📊</span><span class="nav-label">통계</span></button>
  </nav>
</div>

<!-- 회원 메인 -->
<div id="memberView" style="display:none">
  <div class="wrap" id="mContent"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="mn0" onclick="mNav(0)"><span class="nav-icon">🏋️</span><span class="nav-label">운동</span></button>
    <button class="nav-btn" id="mn1" onclick="mNav(1)"><span class="nav-icon">⚖️</span><span class="nav-label">체중</span></button>
    <button class="nav-btn" id="mn2" onclick="mNav(2)"><span class="nav-icon">📊</span><span class="nav-label">기록</span></button>
    <button class="nav-btn" id="mn3" onclick="mNav(3)"><span class="nav-icon">💬</span><span class="nav-label">피드백</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ══ Firebase 설정 ══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAdoE_1bBCg82j063glD2CVU1UPaXwBIIk",
  authDomain: "duguenpt.firebaseapp.com",
  projectId: "duguenpt",
  storageBucket: "duguenpt.firebasestorage.app",
  messagingSenderId: "812960924685",
  appId: "1:812960924685:web:e571378bd635325e600144"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ══ 설정 ═══════════════════════════════════════════════
const TRAINER_PW = 'pt2025!'; // ← 원하는 비밀번호로 변경
const PROGRAM_WEEKS = 8;

// ══ 상태 ═══════════════════════════════════════════════
let currentMode = null;
let currentMember = null;
let currentTrainerTab = 0;
let currentMemberTab = 0;
let selectedMemberForEdit = null;

// ══ 헬퍼 ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function today() { return new Date().toISOString().split('T')[0]; }
function weekNum(startDate) {
  const start = new Date(startDate);
  const now = new Date();
  const diff = Math.floor((now - start) / (7 * 24 * 60 * 60 * 1000));
  return Math.min(diff + 1, PROGRAM_WEEKS);
}
function dayName(d) { return ['일','월','화','수','목','금','토'][d]; }
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function getPhase(week) {
  if (week <= 2) return { name: '적응기', cls: 'adapt', sets: 3, reps: '15회', desc: '가벼운 무게로 자세 정립' };
  if (week <= 5) return { name: '볼륨기', cls: 'volume', sets: 4, reps: '10~12회', desc: '주간 볼륨 점진적 증가' };
  if (week <= 7) return { name: '강도기', cls: 'intensity', sets: 5, reps: '6~8회', desc: '무게 집중 강화' };
  return { name: '디로드', cls: 'deload', sets: 3, reps: '15회 (가볍게)', desc: '회복 및 근육 재생' };
}

// ══ 기본 운동 템플릿 ════════════════════════════════════
const DEFAULT_PROGRAM = {
  name: '8주 기본 루틴',
  weeks: 8,
  schedule: [
    { day: 1, name: '월', focus: '가슴 + 삼두', exercises: [
      { name: '벤치프레스', sets: 4, reps: '8~12', muscle: '가슴' },
      { name: '인클라인 덤벨프레스', sets: 3, reps: '10~12', muscle: '가슴' },
      { name: '케이블 플라이', sets: 3, reps: '12~15', muscle: '가슴' },
      { name: '트라이셉스 푸시다운', sets: 3, reps: '12~15', muscle: '삼두' },
    ]},

function trainerLogin() {

async function memberLogin() {
  const code = document.getElementById('memberCode').value.toUpperCase().trim();
  if (!code) return;
  try {
    const snap = await db.collection('members').where('code', '==', code).get();
    if (snap.empty) {

async function saveMember() {
  const name = document.getElementById('newName').value.trim();
  const code = document.getElementById('newCode').value.toUpperCase().trim();
  const goal = document.getElementById('newGoal').value;
  const start = document.getElementById('newStart').value;
  const weight = parseFloat(document.getElementById('newWeight').value) || 0;
  const target = parseFloat(document.getElementById('newTarget').value) || 0;
  const weakParts = [...document.querySelectorAll('#weakChips .chip.on')].map(c => c.textContent);
  if (!name || !code) { showToast('이름과 코드를 입력해주세요'); return; }
  if (code.length !== 4) { showToast('코드는 4자리여야 합니다'); return; }
  try {
    await db.collection('members').add({ name, code, goal, startDate: start, currentWeight: weight, targetWeight: target, weakParts, createdAt: today() });
    showToast(`${name}님이 추가되었습니다`);
    tNav(0);
  } catch (e) { showToast('저장 실패: ' + e.message); }
}

async function openMemberDetail(memberId) {
  const doc = await db.collection('members').doc(memberId).get();
  const m = { id: doc.id, ...doc.data() };
  selectedMemberForEdit = m;
  const week = m.startDate ? weekNum(m.startDate) : 1;
  const phase = getPhase(week);
  const wtSnap = await db.collection('bodyweight').where('memberId', '==', memberId).orderBy('date', 'desc').limit(14).get();
  const wtData = wtSnap.docs.map(d => d.data()).reverse();

  const c = document.getElementById('tContent');
  let chartHtml = '';
  if (wtData.length > 0) {
    const maxW = Math.max(...wtData.map(d => d.weight));
    const minW = Math.min(...wtData.map(d => d.weight));
    const range = maxW - minW || 1;
    chartHtml = `<div class="chart-wrap"><div class="chart-inner">` +
      wtData.map(d => {
        const h = Math.max(8, Math.round(((d.weight - minW) / range) * 90 + 10));
        return `<div class="bar-col">
          <div class="bar-val" style="font-size:9px;color:var(--sec)">${d.weight}</div>
          <div class="bar" style="height:${h}px;background:var(--blue)"></div>
          <div class="bar-label">${formatDate(d.date)}</div>
        </div>`;
      }).join('') + `</div></div>`;

  c.innerHTML = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

    </div>
  </div>
  <div class="card fade">
    <div class="ctitle">주기화 현황</div>
    <div style="margin-bottom:8px">
      <span class="current-phase ${phase.cls}">${week}주차 · ${phase.name}</span>
    </div>
    <div class="phase-bar">
      ${Array.from({length:8},(_,i)=>{

  let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

      html += `<div class="ex-item">

        <span style="font-size:11px;color:var(--sec);margin-left:4px">세트</span>

// ── 회원: 오늘 운동 ──────────────────────────────────────
async function renderMemberWorkout() {
  const c = document.getElementById('mContent');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const week = currentMember.startDate ? weekNum(currentMember.startDate) : 1;
  const phase = getPhase(week);
  const todayDay = new Date().getDay();
  const progSnap = await db.collection('programs').where('memberId', '==', currentMember.id).limit(1).get();
  const program = progSnap.empty ? DEFAULT_PROGRAM : progSnap.docs[0].data();
  const todaySchedule = program.schedule.find(s => s.day === todayDay) || { focus: '휴식', exercises: [] };
  const existingSnap = await db.collection('workouts')
    .where('memberId', '==', currentMember.id).where('date', '==', today()).get();
  const existingLogs = {};
  existingSnap.docs.forEach(d => { const data = d.data(); existingLogs[data.exerciseName] = data; });
  const prevWeekDate = new Date();
  prevWeekDate.setDate(prevWeekDate.getDate() - 7);
  const prevDate = prevWeekDate.toISOString().split('T')[0];
  const prevSnap = await db.collection('workouts')
    .where('memberId', '==', currentMember.id).where('date', '==', prevDate).get();
  const prevLogs = {};
  prevSnap.docs.forEach(d => { const data = d.data(); prevLogs[data.exerciseName] = data; });

  let html = `<div class="card fade" style="padding:12px 14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;color:var(--sec)">${today()} ${['일','월','화','수','목','금','토'][todayDay]}요일</div>
        <div style="font-size:16px;font-weight:700;margin-top:2px">${todaySchedule.focus}</div>
      </div>
      <span class="current-phase ${phase.cls}">${week}주차 · ${phase.name}</span>
    </div>
  </div>`;

  if (todaySchedule.exercises.length === 0) {
    html += `<div class="card fade" style="text-align:center;padding:32px">
      <div style="font-size:32px;margin-bottom:8px">🛌</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:4px">오늘은 휴식일입니다</div>
      <div style="font-size:13px;color:var(--sec)">충분한 수면과 단백질 섭취로 회복하세요</div>
    </div>`;
  } else {
    for (const ex of todaySchedule.exercises) {
      const existing = existingLogs[ex.name];
      const prev = prevLogs[ex.name];
      const setsToShow = existing ? existing.sets : Array.from({length: ex.sets}, () => ({ weight: '', reps: '', done: false }));
      const prevText = prev ? `지난주: ${prev.sets[0]?.weight||'-'}kg × ${prev.sets[0]?.reps||'-'}회` : '';
      html += `<div class="exercise-card fade">
        <div class="ex-header">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-target">${phase.reps} × ${phase.sets}세트 목표</div>
          </div>
          ${prevText ? `<span class="ex-prev">${prevText}</span>` : ''}
        </div>
        <div id="sets_${ex.name.replace(/\s/g,'_')}">
          ${setsToShow.map((s, i) => `
            <div class="set-row" id="setrow_${ex.name.replace(/\s/g,'_')}_${i}">
              <span class="set-num">${i+1}세트</span>
              <input class="set-input" type="number" placeholder="무게" value="${s.weight||''}" id="w_${ex.name.replace(/\s/g,'_')}_${i}"/>
              <span class="set-unit">kg</span>
              <input class="set-input" type="number" placeholder="횟수" value="${s.reps||''}" id="r_${ex.name.replace(/\s/g,'_')}_${i}"/>
              <span class="set-unit">회</span>
              <div class="set-done ${s.done?'checked':''}" id="done_${ex.name.replace(/\s/g,'_')}_${i}"
                onclick="toggleSetDone('${ex.name}',${i})"></div>
            </div>`).join('')}
        </div>
        <button class="add-set-btn" onclick="addSet('${ex.name}')">+ 세트 추가</button>
      </div>`;
    }
    html += `<button class="btn btn-green" onclick="saveWorkout()">운동 기록 저장</button>`;
  }
  c.innerHTML = html;
}

function toggleSetDone(exName, setIdx) {
  const key = `done_${exName.replace(/\s/g,'_')}_${setIdx}`;
  const el = document.getElementById(key);
  el.classList.toggle('checked');
}
function addSet(exName) {
  const key = `sets_${exName.replace(/\s/g,'_')}`;
  const container = document.getElementById(key);
  const setCount = container.querySelectorAll('.set-row').length;
  const newRow = document.createElement('div');
  newRow.className = 'set-row';
  newRow.id = `setrow_${exName.replace(/\s/g,'_')}_${setCount}`;
  newRow.innerHTML = `<span class="set-num">${setCount+1}세트</span>
    <input class="set-input" type="number" placeholder="무게" id="w_${exName.replace(/\s/g,'_')}_${setCount}"/>
    <span class="set-unit">kg</span>
    <input class="set-input" type="number" placeholder="횟수" id="r_${exName.replace(/\s/g,'_')}_${setCount}"/>
    <span class="set-unit">회</span>
    <div class="set-done" id="done_${exName.replace(/\s/g,'_')}_${setCount}" onclick="toggleSetDone('${exName}',${setCount})"></div>`;
  container.appendChild(newRow);
}

async function saveWorkout() {
  const week = currentMember.startDate ? weekNum(currentMember.startDate) : 1;
  const todayDay = new Date().getDay();
  const progSnap = await db.collection('programs').where('memberId', '==', currentMember.id).limit(1).get();
  const program = progSnap.empty ? DEFAULT_PROGRAM : progSnap.docs[0].data();
  const todaySchedule = program.schedule.find(s => s.day === todayDay);
  if (!todaySchedule || todaySchedule.exercises.length === 0) return;
  const batch = db.batch();
  for (const ex of todaySchedule.exercises) {
    const exKey = ex.name.replace(/\s/g, '_');
    const setRows = document.querySelectorAll(`[id^="setrow_${exKey}_"]`);
    const sets = [];
    setRows.forEach((_, i) => {
      const w = document.getElementById(`w_${exKey}_${i}`)?.value;
      const r = document.getElementById(`r_${exKey}_${i}`)?.value;
      const done = document.getElementById(`done_${exKey}_${i}`)?.classList.contains('checked');
      if (w || r) sets.push({ weight: parseFloat(w)||0, reps: parseInt(r)||0, done });
    });
    if (sets.length === 0) continue;
    const existingSnap = await db.collection('workouts')
      .where('memberId', '==', currentMember.id)
      .where('date', '==', today())
      .where('exerciseName', '==', ex.name).get();
    if (existingSnap.empty) {
      const ref = db.collection('workouts').doc();
      batch.set(ref, { memberId: currentMember.id, memberName: currentMember.name, date: today(), week, exerciseName: ex.name, sets, savedAt: new Date().toISOString() });
    } else {
      batch.update(existingSnap.docs[0].ref, { sets, savedAt: new Date().toISOString() });
    }
  }
  await batch.commit();
  showToast('운동 기록이 저장되었습니다 ✓');
}

// ── 회원: 체중 ──────────────────────────────────────────
async function renderMemberWeight() {
  const c = document.getElementById('mContent');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const snap = await db.collection('bodyweight')
    .where('memberId', '==', currentMember.id)
    .orderBy('date', 'desc').limit(30).get();
  const records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const latest = records[0];
  const prev = records[1];
  const diff = latest && prev ? (latest.weight - prev.weight).toFixed(1) : null;
  const diffClass = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
  const diffText = diff > 0 ? `+${diff}kg` : diff < 0 ? `${diff}kg` : '변화없음';
  const chartData = [...records].reverse();
  let chartHtml = '';
  if (chartData.length > 1) {
    const maxW = Math.max(...chartData.map(d => d.weight));
    const minW = Math.min(...chartData.map(d => d.weight));
    const range = maxW - minW || 1;
    chartHtml = `<div class="chart-wrap"><div class="chart-inner">` +
      chartData.slice(-14).map(d => {
        const h = Math.max(8, Math.round(((d.weight - minW) / range) * 90 + 10));
        return `<div class="bar-col">
          <div class="bar-val" style="color:var(--sec)">${d.weight}</div>
          <div class="bar" style="height:${h}px;background:var(--blue)"></div>
          <div class="bar-label">${formatDate(d.date)}</div>
        </div>`;
      }).join('') + `</div></div>`;
  }

  c.innerHTML = `<div class="card fade">
    <div class="weight-display">
      <div><span class="weight-big">${latest?.weight || currentMember.currentWeight || '-'}</span><span class="weight-unit">kg</span></div>
      ${diff !== null ? `<div class="weight-diff ${diffClass}">${diffText} (전날 대비)</div>` : ''}
      <div style="font-size:12px;color:var(--hint);margin-top:4px">목표: ${currentMember.targetWeight || '-'}kg</div>
    </div>
    ${chartHtml}
  </div>
  <div class="card fade">
    <div class="ctitle">체중 입력</div>
    <div class="field">
      <label>오늘 체중 (kg)</label>
      <input type="number" id="weightInput" step="0.1" placeholder="${latest?.weight || '70.0'}" style="font-size:24px;text-align:center;padding:14px"/>
    </div>
    <button class="btn btn-green" onclick="saveWeight()">저장하기</button>
  </div>
  <div class="card fade">
    <div class="ctitle">최근 기록</div>
    ${records.slice(0,7).map(r => `
      <div class="compare-row">
        <span class="cr-name">${formatDate(r.date)}</span>
        <span class="cr-curr">${r.weight}kg</span>
      </div>`).join('')}
  </div>`;
}

async function saveWeight() {
  const w = parseFloat(document.getElementById('weightInput').value);
  if (!w || w < 20 || w > 300) { showToast('올바른 체중을 입력해주세요'); return; }
  const existing = await db.collection('bodyweight')
    .where('memberId', '==', currentMember.id).where('date', '==', today()).get();
  if (existing.empty) {
    await db.collection('bodyweight').add({ memberId: currentMember.id, memberName: currentMember.name, date: today(), weight: w });
  } else {
    await existing.docs[0].ref.update({ weight: w });
  }
  showToast(`${w}kg 저장 완료 ✓`);
  renderMemberWeight();
}

// ── 회원: 기록/비교 ─────────────────────────────────────
async function renderMemberHistory() {
  const c = document.getElementById('mContent');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const week = currentMember.startDate ? weekNum(currentMember.startDate) : 1;
  const snap = await db.collection('workouts')
    .where('memberId', '==', currentMember.id)
    .where('date', '==', today()).get();
  const prevDate = new Date();
  prevDate.setDate(prevDate.getDate() - 7);
  const prevDateStr = prevDate.toISOString().split('T')[0];
  const prevSnap = await db.collection('workouts')
    .where('memberId', '==', currentMember.id)
    .where('date', '==', prevDateStr).get();
  const todayLogs = snap.docs.map(d => d.data());
  const prevLogs = prevSnap.docs.map(d => d.data());
  const prevMap = {};
  prevLogs.forEach(l => { prevMap[l.exerciseName] = l; });

  let html = `<div class="section-title">${week}주차 · 전주 비교</div>`;
  if (todayLogs.length === 0) {
    html += `<div class="empty-state">오늘 운동 기록이 없습니다</div>`;
  } else {
    html += `<div class="card fade"><div class="ctitle">오늘 vs 지난주 같은 날</div>`;
    for (const log of todayLogs) {
      const prev = prevMap[log.exerciseName];
      const currVol = log.sets.reduce((a, s) => a + (s.weight * s.reps), 0);
      const prevVol = prev ? prev.sets.reduce((a, s) => a + (s.weight * s.reps), 0) : 0;
      const volDiff = prevVol > 0 ? Math.round(((currVol - prevVol) / prevVol) * 100) : null;
      const maxW = Math.max(...log.sets.map(s => s.weight || 0));
      const prevMaxW = prev ? Math.max(...prev.sets.map(s => s.weight || 0)) : 0;
      html += `<div class="compare-row">
        <div style="flex:1">
          <div class="cr-name">${log.exerciseName}</div>
          <div style="font-size:11px;color:var(--hint)">${log.sets.length}세트 · 최고 ${maxW}kg</div>
        </div>
        <div style="text-align:right">
          ${prev ? `<div style="font-size:11px;color:var(--hint)">지난주 ${prevMaxW}kg</div>` : ''}
          ${volDiff !== null ? `<span class="cr-diff ${volDiff>0?'up':volDiff<0?'dn':'eq'}">${volDiff>0?'+':''}${volDiff}%</span>` : ''}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  const recentSnap = await db.collection('workouts')
    .where('memberId', '==', currentMember.id)
    .orderBy('date', 'desc').limit(20).get();
  const byDate = {};
  recentSnap.docs.forEach(d => {
    const data = d.data();
    if (!byDate[data.date]) byDate[data.date] = [];
    byDate[data.date].push(data);
  });
  html += `<div class="section-title">최근 운동 기록</div>`;
  for (const [date, logs] of Object.entries(byDate).slice(0, 5)) {
    html += `<div class="card fade">
      <div class="ctitle" style="font-size:13px">${formatDate(date)} · ${logs.length}개 운동</div>
      ${logs.map(l => `<div class="compare-row">
        <span class="cr-name">${l.exerciseName}</span>
        <span style="font-size:12px;color:var(--sec)">${l.sets.length}세트 · ${Math.max(...l.sets.map(s=>s.weight||0))}kg</span>
      </div>`).join('')}
    </div>`;
  }
  c.innerHTML = html;
}

// ── 회원: 피드백 ─────────────────────────────────────────
async function renderMemberFeedback() {
  const c = document.getElementById('mContent');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const snap = await db.collection('feedbacks')
    .where('memberId', '==', currentMember.id)
    .orderBy('createdAt', 'desc').limit(20).get();
  const feedbacks = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  let html = `<div class="card fade">
    <div class="ctitle">피드백 요청</div>
    <div class="field">
      <label>부위 선택</label>
      <div class="chips" id="fbBodyPart">
        <div class="chip green" onclick="tog(this)">어깨</div>
        <div class="chip green" onclick="tog(this)">무릎</div>
        <div class="chip green" onclick="tog(this)">허리</div>
        <div class="chip green" onclick="tog(this)">팔꿈치</div>
        <div class="chip green" onclick="tog(this)">운동법</div>
        <div class="chip green" onclick="tog(this)">기타</div>
      </div>
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="fbContent" placeholder="예: 스쿼트할 때 무릎이 아파요. 자세를 봐주세요."></textarea>
    </div>
    <button class="btn btn-green" onclick="sendFeedback()">피드백 요청하기</button>
  </div>
  <div class="section-title">이전 피드백</div>`;

  if (feedbacks.length === 0) {
    html += `<div class="empty-state">피드백 기록이 없습니다</div>`;
  } else {
    for (const fb of feedbacks) {
      html += `<div class="feedback-card fade">
        <div class="fb-meta">
          <div class="fb-name">${fb.bodyPart || '일반'}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="fb-badge ${fb.status==='pending'?'pending':'done'}">${fb.status==='pending'?'답변 대기중':'답변완료'}</span>
            <span class="fb-date">${formatDate(fb.createdAt)}</span>
          </div>
        </div>
        <div class="fb-content">${fb.content}</div>
        ${fb.reply ? `<div class="fb-reply">트레이너: ${fb.reply}</div>` : ''}
      </div>`;
    }
  }
  c.innerHTML = html;
}

async function sendFeedback() {
  const bodyParts = [...document.querySelectorAll('#fbBodyPart .chip.on')].map(c => c.textContent).join(', ');
  const content = document.getElementById('fbContent').value.trim();
  if (!content) { showToast('내용을 입력해주세요'); return; }
  await db.collection('feedbacks').add({
    memberId: currentMember.id, memberName: currentMember.name,
    bodyPart: bodyParts || '기타', content, status: 'pending',
    createdAt: today()
  });
  showToast('피드백 요청이 전송되었습니다');
  renderMemberFeedback();
}

function tog(el) { el.classList.toggle('on'); }
</script>
