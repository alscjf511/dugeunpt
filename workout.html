<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>DuguenPT 운동 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f4f1;--card:#fff;--border:rgba(0,0,0,0.09);
  --text:#1a1a18;--sec:#6b6b67;--hint:#a8a8a2;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-t:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-t:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-t:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-t:#b91c1c;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-t:#6d28d9;
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --sh-md:0 4px 16px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:80px}
.hd{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--blue)}
.mode-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.mode-badge.trainer{background:var(--blue-bg);color:var(--blue-t)}
.mode-badge.member{background:var(--green-bg);color:var(--green-t)}
.wrap{max-width:480px;margin:0 auto;padding:14px 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.ctitle{font-size:14px;font-weight:700;margin-bottom:10px}
.ctitle small{font-size:11px;font-weight:400;color:var(--hint);margin-left:5px}
.field{margin-bottom:10px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:600;color:var(--sec);margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}
.field textarea{resize:none;height:72px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.btn{width:100%;padding:12px;font-size:14px;font-weight:700;border-radius:var(--r-md);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;margin-top:7px}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.25)}
.btn-gray{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-red{background:var(--red-bg);color:var(--red-t);border:1px solid var(--red)}
.btn:hover{opacity:.88}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;color:var(--sec);background:var(--card);font-family:'Noto Sans KR',sans-serif;transition:all .15s;user-select:none}
.chip.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-t);font-weight:600}
.chip.green.on{background:var(--green-bg);border-color:var(--green);color:var(--green-t)}

/* ── 운동 카드 ── */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.ex-top{display:flex;gap:10px;padding:10px 12px;background:var(--bg);align-items:center}
.ex-muscle-img{width:52px;height:52px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;background:#e0e0dc}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:700;margin-bottom:2px}
.ex-target{font-size:11px;color:var(--sec)}
.ex-prev{font-size:11px;color:var(--blue-t);background:var(--blue-bg);padding:2px 7px;border-radius:8px;font-weight:500;display:inline-block;margin-top:3px}
.ex-phase{font-size:11px;color:var(--green-t);background:var(--green-bg);padding:2px 7px;border-radius:8px;font-weight:600;flex-shrink:0}

/* ── 세트 행 ── */
.sets-table{width:100%;border-collapse:collapse}
.sets-table th{font-size:11px;font-weight:600;color:var(--hint);padding:6px 8px;text-align:center;background:var(--bg);border-bottom:1px solid var(--border)}
.sets-table th:first-child{width:36px}
.sets-table th:last-child{width:36px}
.sets-table td{padding:7px 5px;text-align:center;border-bottom:1px solid var(--border)}
.sets-table tr:last-child td{border-bottom:none}
.set-inp{width:100%;padding:7px 4px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;text-align:center;background:var(--bg);font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none;min-width:0}
.set-inp:focus{outline:none;border-color:var(--blue)}
.set-check{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:14px;transition:all .15s}
.set-check.done{background:var(--green);border-color:var(--green);color:#fff}
.set-del{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;color:var(--hint);font-size:14px;line-height:1}
.set-del:hover{background:var(--red-bg);border-color:var(--red);color:var(--red-t)}
.add-set-btn{width:100%;padding:9px;font-size:12px;font-weight:600;color:var(--blue-t);background:var(--blue-bg);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}

/* ── 체중 ── */
.wt-big{text-align:center;padding:16px 0}
.wt-num{font-size:48px;font-weight:700;color:var(--text);line-height:1}
.wt-unit{font-size:16px;color:var(--sec);margin-left:3px}
.wt-diff{font-size:13px;font-weight:600;margin-top:6px}
.wt-diff.up{color:var(--amber-t)}
.wt-diff.dn{color:var(--green-t)}

/* ── 차트 ── */
.chart-wrap{overflow-x:auto;padding:4px 0}
.chart-inner{display:flex;align-items:flex-end;gap:5px;padding:0 6px;min-height:100px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:24px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height .3s}
.bar-lbl{font-size:9px;color:var(--sec);margin-top:2px;white-space:nowrap}
.bar-val{font-size:9px;font-weight:600;color:var(--sec);margin-bottom:1px}

/* ── 피드백 ── */
.fb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;margin-bottom:8px;box-shadow:var(--sh)}
.fb-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.fb-name{font-size:13px;font-weight:700}
.fb-date{font-size:11px;color:var(--hint)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.badge-pend{background:var(--amber-bg);color:var(--amber-t)}
.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-req{background:var(--blue-bg);color:var(--blue-t)}
.fb-reply{background:var(--blue-bg);border-radius:var(--r-sm);padding:8px 10px;font-size:12px;color:var(--blue-t);margin-top:6px;line-height:1.5}

/* ── 주간 프로그램 보기 ── */
.week-view{overflow-x:auto;margin:-4px}
.week-scroll{display:flex;gap:8px;padding:4px;min-width:max-content}
.day-col{background:var(--bg);border-radius:var(--r-md);padding:10px;min-width:120px;border:1px solid var(--border)}
.day-col.today{background:var(--blue-bg);border-color:var(--blue)}
.day-col-title{font-size:12px;font-weight:700;color:var(--sec);margin-bottom:6px}
.day-col.today .day-col-title{color:var(--blue-t)}
.day-focus{font-size:11px;font-weight:600;color:var(--text);margin-bottom:6px}
.day-ex-item{font-size:11px;color:var(--sec);padding:2px 0;border-bottom:1px solid var(--border)}
.day-ex-item:last-child{border-bottom:none}

/* ── 주기화 ── */
.phase-wrap{margin-bottom:10px}
.phase-bar{display:flex;gap:3px;margin-bottom:5px}
.phase-blk{flex:1;height:5px;border-radius:2px}
.phase-blk.adapt{background:#5DCAA5}
.phase-blk.volume{background:#378ADD}
.phase-blk.intensity{background:#534AB7}
.phase-blk.deload{background:#E24B4A}
.phase-blk.off{background:var(--border)}
.phase-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px}
.phase-tag.adapt{background:#E1F5EE;color:#085041}
.phase-tag.volume{background:#E6F1FB;color:#0C447C}
.phase-tag.intensity{background:#EEEDFE;color:#3C3489}
.phase-tag.deload{background:#FCEBEB;color:#791F1F}

/* ── 비교 행 ── */
.cmp-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.cmp-row:last-child{border-bottom:none}
.cmp-name{flex:1;font-size:13px;font-weight:600}
.cmp-prev{font-size:11px;color:var(--hint);margin-right:6px}
.cmp-curr{font-size:13px;font-weight:700;min-width:60px;text-align:right}
.cmp-diff{font-size:11px;font-weight:600;padding:1px 6px;border-radius:8px;margin-left:5px}
.cmp-diff.up{background:var(--green-bg);color:var(--green-t)}
.cmp-diff.dn{background:var(--red-bg);color:var(--red-t)}
.cmp-diff.eq{background:var(--bg);color:var(--sec)}

/* ── 회원 카드 ── */
.mem-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--sh)}
.mem-av{width:40px;height:40px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--blue-t);flex-shrink:0}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:14px;font-weight:700}
.mem-sub{font-size:11px;color:var(--sec);margin-top:1px}
.notif{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px}

/* ── 바텀 네비 ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.05)}
.nb{flex:1;padding:8px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif}
.ni{font-size:19px;line-height:1}
.nl{font-size:10px;font-weight:600;color:var(--sec)}
.nb.on .nl{color:var(--blue)}

/* ── 로딩 / 기타 ── */
.loading{display:flex;align-items:center;justify-content:center;padding:36px;flex-direction:column;gap:10px}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a18;color:#fff;padding:9px 20px;border-radius:18px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:28px 16px;color:var(--hint);font-size:13px}
.sec-lbl{font-size:12px;font-weight:700;color:var(--text);margin:14px 0 7px;text-transform:uppercase;letter-spacing:.04em}
.fade{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* 랜딩 */
.land{max-width:400px;margin:0 auto;padding:36px 16px;text-align:center}
.land h1{font-size:24px;font-weight:700;margin-bottom:6px}
.land h1 span{color:var(--blue)}
.land p{font-size:14px;color:var(--sec);margin-bottom:28px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mc{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:22px 14px;cursor:pointer;transition:all .2s}
.mc:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.mc.blue:hover,.mc.blue.sel{border-color:var(--blue);background:var(--blue-bg)}
.mc.green:hover,.mc.green.sel{border-color:var(--green);background:var(--green-bg)}
.mc-ic{font-size:28px;margin-bottom:6px}
.mc-t{font-size:14px;font-weight:700;margin-bottom:3px}
.mc-d{font-size:11px;color:var(--sec)}
.mc.blue .mc-t{color:var(--blue-t)}
.mc.green .mc-t{color:var(--green-t)}
</style>
</head>
<body>

<header class="hd">
  <div class="logo">Duguen<span>PT</span></div>
  <div id="badge" style="display:none" class="mode-badge"></div>
</header>

<!-- 랜딩 -->
<div id="landView" class="fade">
  <div class="land">
    <h1>Duguen<span>PT</span></h1>
    <p>운동 기록 · 체중 · 피드백을<br>한 곳에서 관리하세요</p>
    <div class="mode-cards">
      <div class="mc blue" onclick="selMode('trainer')">
        <div class="mc-ic">🏋️</div>
        <div class="mc-t">트레이너</div>
        <div class="mc-d">회원 관리 · 프로그램</div>
      </div>
      <div class="mc green" onclick="selMode('member')">
        <div class="mc-ic">💪</div>
        <div class="mc-t">회원</div>
        <div class="mc-d">운동 기록 · 체중</div>
      </div>
    </div>
    <div id="tLoginBox" style="display:none" class="card fade">
      <div class="field"><label>트레이너 비밀번호</label>
        <input type="password" id="tPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tLogin()"/>
      </div>
      <button class="btn btn-blue" onclick="tLogin()">입장</button>
      <div id="tErr" style="display:none;font-size:12px;color:var(--red);margin-top:6px;text-align:center">비밀번호가 올바르지 않습니다</div>
    </div>
    <div id="mLoginBox" style="display:none" class="card fade">
      <div class="field"><label>회원 코드</label>
        <input type="text" id="mCode" placeholder="예: K7A2" style="text-transform:uppercase;font-size:20px;text-align:center;letter-spacing:4px" maxlength="4" onkeydown="if(event.key==='Enter')mLogin()" oninput="this.value=this.value.toUpperCase()"/>
      </div>
      <button class="btn btn-green" onclick="mLogin()">입장</button>
      <div id="mErr" style="display:none;font-size:12px;color:var(--red);margin-top:6px;text-align:center">코드를 찾을 수 없습니다</div>
    </div>
  </div>
</div>

<!-- 트레이너 -->
<div id="tView" style="display:none">
  <div class="wrap" id="tCont"></div>
  <nav class="bnav">
    <button class="nb on" id="tn0" onclick="tNav(0)"><span class="ni">👥</span><span class="nl">회원</span></button>
    <button class="nb" id="tn1" onclick="tNav(1)"><span class="ni">📋</span><span class="nl">프로그램</span></button>
    <button class="nb" id="tn2" onclick="tNav(2)"><span class="ni">💬</span><span class="nl">피드백</span></button>
    <button class="nb" id="tn3" onclick="tNav(3)"><span class="ni">📊</span><span class="nl">통계</span></button>
  </nav>
</div>

<!-- 회원 -->
<div id="mView" style="display:none">
  <div class="wrap" id="mCont"></div>
  <nav class="bnav">
    <button class="nb on" id="mn0" onclick="mNav(0)"><span class="ni">🏋️</span><span class="nl">운동</span></button>
    <button class="nb" id="mn1" onclick="mNav(1)"><span class="ni">⚖️</span><span class="nl">체중</span></button>
    <button class="nb" id="mn2" onclick="mNav(2)"><span class="ni">📊</span><span class="nl">기록</span></button>
    <button class="nb" id="mn3" onclick="mNav(3)"><span class="ni">💬</span><span class="nl">피드백</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

// ══ 헬퍼 ══
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(s){ if(!s) return ''; const d=new Date(s); return `${d.getMonth()+1}/${d.getDate()}`; }
function weekNum(start){ const d=Math.floor((new Date()-new Date(start))/(7*86400000)); return Math.min(d+1,8); }
function getPhase(w){ if(w<=2) return{name:'적응기',cls:'adapt',reps:'15회',sets:3,desc:'자세 정립 · 가벼운 무게'}; if(w<=5) return{name:'볼륨기',cls:'volume',reps:'10~12회',sets:4,desc:'주간 볼륨 점진 증가'}; if(w<=7) return{name:'강도기',cls:'intensity',reps:'6~8회',sets:5,desc:'무게 집중 강화'}; return{name:'디로드',cls:'deload',reps:'15회 (가볍게)',sets:3,desc:'회복 및 재생'}; }
function tog(el){ el.classList.toggle('on'); }

function selMode(m){
  document.getElementById('tLoginBox').style.display='none';
  document.getElementById('mLoginBox').style.display='none';
  if(m==='trainer'){ document.getElementById('tLoginBox').style.display='block'; setTimeout(()=>document.getElementById('tPw').focus(),100); }
  else { document.getElementById('mLoginBox').style.display='block'; setTimeout(()=>document.getElementById('mCode').focus(),100); }
}
function tLogin(){
  if(document.getElementById('tPw').value===TRAINER_PW){
    curMode='trainer';
    document.getElementById('landView').style.display='none';
    document.getElementById('tView').style.display='block';
    const b=document.getElementById('badge'); b.style.display='block'; b.className='mode-badge trainer'; b.textContent='트레이너';
    tNav(0);

async function mLogin(){
  const code=document.getElementById('mCode').value.toUpperCase().trim();
  if(!code){ toast('코드를 입력해주세요'); return; }
  try {
    const snap=await db.collection('members').where('code','==',code).get();
    if(snap.empty){ document.getElementById('mErr').style.display='block'; return; }
    curMember={id:snap.docs[0].id,...snap.docs[0].data()};
    curMode='member';
    document.getElementById('landView').style.display='none';
    document.getElementById('mView').style.display='block';
    const b=document.getElementById('badge'); b.style.display='block'; b.className='mode-badge member'; b.textContent=curMember.name+'님';
    mNav(0);
  } catch(e){ document.getElementById('mErr').style.display='block'; }
}

async function saveMember(){

async function mWorkout(){
  const c=document.getElementById('mCont');
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  const w=curMember.startDate?weekNum(curMember.startDate):1;
  const ph=getPhase(w);
  const todayDay=new Date().getDay();
  const progSnap=await db.collection('programs').where('memberId','==',curMember.id).get();
  const prog=progSnap.empty?DEFAULT_PROGRAM:progSnap.docs[0].data();
  const sched=prog.schedule.find(s=>s.day===todayDay)||{focus:'휴식',exercises:[]};
  const existSnap=await db.collection('workouts').where('memberId','==',curMember.id).where('date','==',today()).get();
  const existMap={};
  existSnap.docs.forEach(d=>{const data=d.data();existMap[data.exerciseName]=data;});
  const prevDate=new Date(); prevDate.setDate(prevDate.getDate()-7);
  const prevStr=prevDate.toISOString().split('T')[0];
  const prevSnap=await db.collection('workouts').where('memberId','==',curMember.id).where('date','==',prevStr).get();
  const prevMap={};
  prevSnap.docs.forEach(d=>{const data=d.data();prevMap[data.exerciseName]=data;});

  let html=`<div class="card fade" style="padding:10px 12px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:11px;color:var(--sec)">${today()} ${['일','월','화','수','목','금','토'][todayDay]}요일</div>
        <div style="font-size:15px;font-weight:700">${sched.focus}</div>
      </div>
      <span class="phase-tag ${ph.cls}">${w}주차 · ${ph.name}</span>
    </div>
  </div>`;

  // 주간 전체 보기 버튼
  html+=`<button class="btn btn-gray" style="margin-bottom:10px;font-size:12px" onclick="showWeekView()">📋 이번 주 전체 프로그램 보기</button>`;
  html+=`<div id="weekViewWrap" style="display:none"></div>`;

  if(!sched.exercises.length){
    html+=`<div class="card fade" style="text-align:center;padding:28px">
      <div style="font-size:36px;margin-bottom:8px">🛌</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:4px">오늘은 휴식일</div>
      <div style="font-size:13px;color:var(--sec)">충분한 수면과 단백질로 회복하세요</div>
    </div>`;
  } else {
    sched.exercises.forEach((ex,ei)=>{
      const exInfo=EX_DB[ex.name]||{muscle:'전신',img:''};
      const exist=existMap[ex.name];
      const prev=prevMap[ex.name];
      const initSets=exist?exist.sets:Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false}));
      const prevText=prev&&prev.sets&&prev.sets.length?`지난주 ${prev.sets[0]?.weight||'-'}kg×${prev.sets[0]?.reps||'-'}회`:'';
      const exKey=ex.name.replace(/[\s·]+/g,'_');
      html+=`<div class="ex-card fade">
        <div class="ex-top">
          ${exInfo.img?`<img src="${exInfo.img}" class="ex-muscle-img" alt="${ex.name}" onerror="this.style.display='none'"/>`:'<div class="ex-muscle-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">💪</div>'}
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-target">타겟: ${exInfo.muscle}</div>
            ${prevText?`<div class="ex-prev">${prevText}</div>`:''}
          </div>
          <span class="ex-phase">${ph.reps}×${ph.sets}</span>
        </div>
        <table class="sets-table">
          <thead><tr><th>세트</th><th>무게(kg)</th><th>횟수</th><th>완료</th><th></th></tr></thead>
          <tbody id="setBody_${exKey}">
            ${initSets.map((s,i)=>`<tr id="setRow_${exKey}_${i}">
              <td style="font-size:12px;color:var(--sec);font-weight:600">${i+1}</td>
              <td><input class="set-inp" type="number" placeholder="-" value="${s.weight||''}" id="w_${exKey}_${i}"/></td>
              <td><input class="set-inp" type="number" placeholder="-" value="${s.reps||''}" id="r_${exKey}_${i}"/></td>
              <td><div class="set-check ${s.done?'done':''}" id="chk_${exKey}_${i}" onclick="toggleChk('${exKey}',${i})">${s.done?'✓':''}</div></td>
              <td><button class="set-del" onclick="delSet('${exKey}',${i})">×</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <button class="add-set-btn" onclick="addSet('${exKey}')">+ 세트 추가</button>
      </div>`;
    });
    html+=`<button class="btn btn-green" onclick="saveWorkout()">운동 기록 저장 💾</button>`;
  }
  c.innerHTML=html;
}

function showWeekView(){
  const wrap=document.getElementById('weekViewWrap');
  if(wrap.style.display==='block'){wrap.style.display='none';return;}
  const todayDay=new Date().getDay();
  wrap.innerHTML=`<div class="card fade" style="margin-bottom:10px">
    <div class="ctitle">이번 주 전체 프로그램</div>
    <div class="week-view"><div class="week-scroll">
      ${DEFAULT_PROGRAM.schedule.map(d=>`<div class="day-col ${d.day===todayDay?'today':''}">
        <div class="day-col-title">${d.name}요일 ${d.day===todayDay?'(오늘)':''}</div>
        <div class="day-focus">${d.focus}</div>
        ${d.exercises.map(e=>`<div class="day-ex-item">${e.name}</div>`).join('')||'<div class="day-ex-item" style="color:var(--hint)">휴식</div>'}
      </div>`).join('')}
    </div></div>
  </div>`;
  wrap.style.display='block';
}

function toggleChk(key,i){
  const el=document.getElementById(`chk_${key}_${i}`);
  const isDone=!el.classList.contains('done');
  el.classList.toggle('done',isDone);
  el.textContent=isDone?'✓':'';
}
function addSet(key){
  const tbody=document.getElementById('setBody_'+key);
  const cnt=tbody.querySelectorAll('tr').length;
  const tr=document.createElement('tr');
  tr.id=`setRow_${key}_${cnt}`;
  tr.innerHTML=`<td style="font-size:12px;color:var(--sec);font-weight:600">${cnt+1}</td>
    <td><input class="set-inp" type="number" placeholder="-" id="w_${key}_${cnt}"/></td>
    <td><input class="set-inp" type="number" placeholder="-" id="r_${key}_${cnt}"/></td>
    <td><div class="set-check" id="chk_${key}_${cnt}" onclick="toggleChk('${key}',${cnt})"></div></td>
    <td><button class="set-del" onclick="delSet('${key}',${cnt})">×</button></td>`;
  tbody.appendChild(tr);
}
function delSet(key,idx){
  const row=document.getElementById(`setRow_${key}_${idx}`);
  if(row){
    const tbody=row.parentNode;
    row.remove();
    // 세트 번호 재정렬
    tbody.querySelectorAll('tr').forEach((tr,i)=>{
      tr.cells[0].textContent=i+1;
    });
  }
}

async function saveWorkout(){
  const w=curMember.startDate?weekNum(curMember.startDate):1;
  const todayDay=new Date().getDay();
  const prog=DEFAULT_PROGRAM;
  const sched=prog.schedule.find(s=>s.day===todayDay);
  if(!sched||!sched.exercises.length) return;
  const batch=db.batch();
  for(const ex of sched.exercises){
    const key=ex.name.replace(/[\s·]+/g,'_');
    const rows=document.querySelectorAll(`[id^="setRow_${key}_"]`);
    const sets=[];
    rows.forEach((_,i)=>{
      const wEl=document.getElementById(`w_${key}_${i}`);
      const rEl=document.getElementById(`r_${key}_${i}`);
      const cEl=document.getElementById(`chk_${key}_${i}`);
      if(wEl&&rEl&&(wEl.value||rEl.value)){
        sets.push({weight:parseFloat(wEl.value)||0,reps:parseInt(rEl.value)||0,done:cEl?cEl.classList.contains('done'):false});
      }
    });
    if(!sets.length) continue;
    const existing=await db.collection('workouts').where('memberId','==',curMember.id).where('date','==',today()).where('exerciseName','==',ex.name).get();
    if(existing.empty){ const ref=db.collection('workouts').doc(); batch.set(ref,{memberId:curMember.id,memberName:curMember.name,date:today(),week:w,exerciseName:ex.name,sets,savedAt:new Date().toISOString()}); }
    else { batch.update(existing.docs[0].ref,{sets,savedAt:new Date().toISOString()}); }
  }
  await batch.commit();
  toast('운동 기록 저장 완료 ✓');
}

// ── 회원: 체중 ──
async function mWeight(){
  const c=document.getElementById('mCont');
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  try {
    const snap=await db.collection('bodyweight').where('memberId','==',curMember.id).get();
    const recs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date.localeCompare(b.date));
    const latest=recs[recs.length-1], prev=recs[recs.length-2];
    const diff=latest&&prev?(latest.weight-prev.weight).toFixed(1):null;
    const diffCls=diff>0?'up':diff<0?'dn':'same';
    const diffTxt=diff>0?`+${diff}kg ↑`:diff<0?`${diff}kg ↓`:'변화 없음';
    let chartHtml='<div class="empty">기록 2개 이상 필요</div>';
    const last14=recs.slice(-14);
    if(last14.length>1){
      const maxW=Math.max(...last14.map(d=>d.weight)), minW=Math.min(...last14.map(d=>d.weight)), rng=maxW-minW||1;
      chartHtml=`<div class="chart-wrap"><div class="chart-inner">${last14.map(d=>{
        const h=Math.max(6,Math.round(((d.weight-minW)/rng)*80+10));
        return`<div class="bar-col"><div class="bar-val">${d.weight}</div><div class="bar" style="height:${h}px;background:${curMember.goal==='감량'?'var(--green)':'var(--blue)'}"></div><div class="bar-lbl">${fmtDate(d.date)}</div></div>`;
      }).join('')}</div></div>`;
    }
    c.innerHTML=`<div class="card fade">
      <div class="wt-big">
        <span class="wt-num">${latest?.weight||curMember.currentWeight||'-'}</span><span class="wt-unit">kg</span>
        ${diff!==null?`<div class="wt-diff ${diffCls}">${diffTxt} (전날 대비)</div>`:''}
        <div style="font-size:11px;color:var(--hint);margin-top:4px">목표 ${curMember.targetWeight||'-'}kg${latest&&curMember.targetWeight?` · ${Math.abs(latest.weight-curMember.targetWeight).toFixed(1)}kg 남음`:''}</div>
      </div>
      ${chartHtml}
    </div>
    <div class="card fade">
      <div class="ctitle">오늘 체중 입력</div>
      <div class="field"><input type="number" id="wtInp" step="0.1" placeholder="${latest?.weight||'70.0'}" style="font-size:22px;text-align:center;padding:12px"/></div>
      <button class="btn btn-green" onclick="saveWeight()">저장</button>
    </div>
    <div class="card fade">
      <div class="ctitle">최근 기록</div>
      ${recs.slice(-7).reverse().map(r=>`<div class="cmp-row"><span class="cmp-name">${fmtDate(r.date)}</span><span class="cmp-curr">${r.weight}kg</span></div>`).join('')||'<div class="empty">기록 없음</div>'}
    </div>`;
  } catch(e){ c.innerHTML=`<div class="empty">오류: ${e.message}</div>`; }
}

async function saveWeight(){
  const w=parseFloat(document.getElementById('wtInp').value);
  if(!w||w<20||w>300){ toast('올바른 체중을 입력해주세요'); return; }
  const existing=await db.collection('bodyweight').where('memberId','==',curMember.id).where('date','==',today()).get();
  if(existing.empty) await db.collection('bodyweight').add({memberId:curMember.id,memberName:curMember.name,date:today(),weight:w});
  else await existing.docs[0].ref.update({weight:w});
  toast(`${w}kg 저장 완료 ✓`);
  mWeight();
}

// ── 회원: 기록 ──
async function mHistory(){
  const c=document.getElementById('mCont');
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  try {
    const snap=await db.collection('workouts').where('memberId','==',curMember.id).get();
    const all=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date));
    const prevDate=new Date(); prevDate.setDate(prevDate.getDate()-7);
    const prevStr=prevDate.toISOString().split('T')[0];
    const todayLogs=all.filter(l=>l.date===today());
    const prevLogs=all.filter(l=>l.date===prevStr);
    const prevMap={};
    prevLogs.forEach(l=>{prevMap[l.exerciseName]=l;});
    let html='';
    if(todayLogs.length){
      html+=`<div class="sec-lbl">오늘 vs 지난주 비교</div><div class="card fade">`;
      todayLogs.forEach(log=>{
        const prev=prevMap[log.exerciseName];
        const currMax=Math.max(...(log.sets||[]).map(s=>s.weight||0));
        const prevMax=prev?Math.max(...(prev.sets||[]).map(s=>s.weight||0)):0;
        const currVol=(log.sets||[]).reduce((a,s)=>a+(s.weight||0)*(s.reps||0),0);
        const prevVol=prev?(prev.sets||[]).reduce((a,s)=>a+(s.weight||0)*(s.reps||0),0):0;
        const diff=prevVol>0?Math.round(((currVol-prevVol)/prevVol)*100):null;
        html+=`<div class="cmp-row">
          <div style="flex:1"><div class="cmp-name">${log.exerciseName}</div><div style="font-size:11px;color:var(--hint)">${(log.sets||[]).length}세트 · 최고 ${currMax}kg</div></div>
          <div style="text-align:right">${prev?`<div style="font-size:11px;color:var(--hint)">지난주 ${prevMax}kg</div>`:''}${diff!==null?`<span class="cmp-diff ${diff>0?'up':diff<0?'dn':'eq'}">${diff>0?'+':''}${diff}%</span>`:''}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    const byDate={};
    all.forEach(l=>{if(!byDate[l.date])byDate[l.date]=[];byDate[l.date].push(l);});
    html+=`<div class="sec-lbl">최근 운동 기록</div>`;
    Object.entries(byDate).slice(0,7).forEach(([date,logs])=>{
      html+=`<div class="card fade"><div class="ctitle" style="font-size:13px">${fmtDate(date)} · ${logs.length}개 운동</div>
        ${logs.map(l=>`<div class="cmp-row"><span class="cmp-name">${l.exerciseName}</span><span style="font-size:12px;color:var(--sec)">${(l.sets||[]).length}세트 · ${Math.max(...(l.sets||[]).map(s=>s.weight||0))}kg</span></div>`).join('')}
      </div>`;
    });
    if(!all.length) html=`<div class="empty">운동 기록이 없습니다</div>`;
    c.innerHTML=html;
  } catch(e){ c.innerHTML=`<div class="empty">오류: ${e.message}</div>`; }
}

// ── 회원: 피드백 ──
async function mFeedbackView(){
  const c=document.getElementById('mCont');
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  try {
    const snap=await db.collection('feedbacks').where('memberId','==',curMember.id).get();
    const fbs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    let html=`<div class="card fade">
      <div class="ctitle">피드백 요청</div>
      <div class="field"><label>부위 선택</label>
        <div class="chips" id="fbPart">
          <div class="chip green" onclick="tog(this)">어깨</div>
          <div class="chip green" onclick="tog(this)">무릎</div>
          <div class="chip green" onclick="tog(this)">허리</div>
          <div class="chip green" onclick="tog(this)">팔꿈치</div>
          <div class="chip green" onclick="tog(this)">운동법</div>
          <div class="chip green" onclick="tog(this)">기타</div>
        </div>
      </div>
      <div class="field"><label>내용</label>
        <textarea id="fbTxt" placeholder="예: 스쿼트할 때 무릎이 아파요"></textarea>
      </div>
      <button class="btn btn-green" onclick="sendFb()">요청 전송</button>
    </div>
    <div class="sec-lbl">이전 피드백</div>`;
    if(!fbs.length){ html+=`<div class="empty">피드백 기록이 없습니다</div>`; }
    fbs.forEach(fb=>{
      html+=`<div class="fb-card fade">
        <div class="fb-hdr">
          <div class="fb-name">${fb.bodyPart||'기타'}</div>
          <div style="display:flex;gap:5px;align-items:center">
            <span class="badge ${fb.status==='pending'?'badge-pend':'badge-done'}">${fb.status==='pending'?'답변 대기':'완료'}</span>
            <span class="fb-date">${fmtDate(fb.createdAt)}</span>
          </div>
        </div>
        <div style="font-size:13px;line-height:1.6">${fb.content}</div>
        ${fb.reply?`<div class="fb-reply">트레이너: ${fb.reply}</div>`:''}
      </div>`;
    });
    c.innerHTML=html;
  } catch(e){ c.innerHTML=`<div class="empty">오류: ${e.message}</div>`; }
}

async function sendFb(){
  const parts=[...document.querySelectorAll('#fbPart .chip.on')].map(c=>c.textContent).join(', ');
  const txt=document.getElementById('fbTxt').value.trim();
  if(!txt){ toast('내용을 입력해주세요'); return; }
  await db.collection('feedbacks').add({memberId:curMember.id,memberName:curMember.name,bodyPart:parts||'기타',content:txt,status:'pending',createdAt:today()});
  toast('피드백 요청 전송 완료');
  mFeedbackView();
}
</script>
